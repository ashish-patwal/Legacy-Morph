services:
  - type: web
    name: legacy-morph
    runtime: docker
    plan: free
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:////tmp/legacy-morph.db
      - key: ARTIFACT_ROOT
        value: /tmp/legacy-morph-artifacts
      - key: CORS_ORIGINS
        value: ""
